services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: churn_signal
      POSTGRES_USER: churn
      POSTGRES_PASSWORD: churn
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data", "./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro"]
  api:
    build: ./backend
    environment:
      DATABASE_URL: postgres://churn:churn@postgres:5432/churn_signal
    ports: ["3000:3000"]
    depends_on: [postgres]
  n8n:
    image: n8nio/n8n:latest
    ports: ["5678:5678"]
    environment:
      N8N_ENCRYPTION_KEY: replace-with-a-long-random-secret
      N8N_DIAGNOSTICS_ENABLED: "false"
      WEBHOOK_URL: http://localhost:5678/
      N8N_ALLOW_ENV_VARIABLES: "true"
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SENDER: ${SMTP_SENDER}
      SMTP_SSL: ${SMTP_SSL}
      CREDENTIALS_OVERWRITE_DATA: |
        {
          "smtp": {
            "host": "${SMTP_HOST}",
            "port": ${SMTP_PORT},
            "user": "${SMTP_USER}",
            "password": "${SMTP_PASSWORD}",
            "ssl": ${SMTP_SSL}
          }
        }
    volumes: ["n8n_data:/home/node/.n8n", "./n8n/workflows:/workflows:ro"]
volumes:
  postgres_data:
  n8n_data:
